<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Coordenadas Offline</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        ul {
            list-style-type: none;
            padding: 0;
            margin-top: 20px;
        }
        li {
            background: #eee;
            margin-bottom: 5px;
            padding: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Salvar Cidade (Offline)</h2>
    
    <div class="form-group">
        <label for="cidade">Nome da Cidade/Local:</label>
        <input type="text" id="cidade" placeholder="Ex: São Paulo">
    </div>
    
    <div class="form-group">
        <label for="latitude">Latitude:</label>
        <input type="number" id="latitude" step="any" placeholder="Ex: -23.55052">
    </div>
    
    <div class="form-group">
        <label for="longitude">Longitude:</label>
        <input type="number" id="longitude" step="any" placeholder="Ex: -46.633308">
    </div>
    
    <button onclick="salvarLocalizacao()">Salvar no Banco de Dados</button>

    <h3>Cidades Salvas:</h3>
    <ul id="listaCidades"></ul>
</div>

<script>
    let db;

    // 1. Inicializa o Banco de Dados IndexedDB (Nativo do Navegador e Offline)
    const request = indexedDB.open("MapaOfflineDB", 1);

    request.onupgradeneeded = function(event) {
        db = event.target.result;
        // Cria uma tabela chamada "cidades" com uma chave auto-incrementável
        db.createObjectStore("cidades", { keyPath: "id", autoIncrement: true });
    };

    request.onsuccess = function(event) {
        db = event.target.result;
        exibirCidades(); // Mostra os dados já salvos assim que carrega a página
    };

    request.onerror = function(event) {
        console.error("Erro ao abrir o banco de dados:", event.target.errorCode);
    };

    // 2. Função para salvar os dados digitados
    function salvarLocalizacao() {
        const cidade = document.getElementById('cidade').value;
        const lat = parseFloat(document.getElementById('latitude').value);
        const lng = parseFloat(document.getElementById('longitude').value);

        if (!cidade || isNaN(lat) || isNaN(lng)) {
            alert("Por favor, preencha todos os campos corretamente.");
            return;
        }

        const novoRegistro = { nome: cidade, latitude: lat, longitude: lng };

        // Cria uma transação de escrita no banco de dados
        const transaction = db.transaction(["cidades"], "readwrite");
        const store = transaction.objectStore("cidades");
        
        const addRequest = store.add(novoRegistro);

        addRequest.onsuccess = function() {
            // Limpa os campos do formulário
            document.getElementById('cidade').value = '';
            document.getElementById('latitude').value = '';
            document.getElementById('longitude').value = '';
            
            // Atualiza a lista na tela
            exibirCidades();
        };
    }

    // 3. Função para ler o banco de dados e listar na tela
    function exibirCidades() {
        const lista = document.getElementById('listaCidades');
        lista.innerHTML = ''; // Limpa a lista atual na tela

        const transaction = db.transaction(["cidades"], "readonly");
        const store = transaction.objectStore("cidades");
        const cursorRequest = store.openCursor();

        cursorRequest.onsuccess = function(event) {
            const cursor = event.target.result;
            if (cursor) {
                const li = document.createElement('li');
                li.innerHTML = `<strong>${cursor.value.nome}</strong> (Lat: ${cursor.value.latitude}, Lng: ${cursor.value.longitude})`;
                lista.appendChild(li);
                
                cursor.continue(); // Passa para o próximo registro
            }
        };
    }
</script>

</body>
</html>
