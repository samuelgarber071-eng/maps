<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador de Tempo (Estilo Maps)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            text-align: center;
            color: #1a73e8;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #155cb4;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f0fe;
            border-radius: 6px;
            display: none;
            border-left: 5px solid #1a73e8;
        }
        .result p {
            margin: 5px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Calculador de Rota</h2>
    
    <div class="form-group">
        <label for="origem">Local de Partida:</label>
        <input type="text" id="origem" placeholder="Ex: Sua Casa">
    </div>

    <div class="form-group">
        <label for="destino">Destino:</label>
        <input type="text" id="destino" placeholder="Ex: Trabalho">
    </div>

    <div class="form-group">
        <label for="distancia">Distância Estimada (em km):</label>
        <input type="number" id="distancia" placeholder="Ex: 15" min="0" step="0.1">
    </div>

    <div class="form-group">
        <label for="transporte">Meio de Transporte:</label>
        <select id="transporte">
            <option value="60">🚗 Carro (Média: 60 km/h)</option>
            <option value="70">🏍️ Moto (Média: 70 km/h)</option>
            <option value="15">🚲 Bicicleta (Média: 15 km/h)</option>
            <option value="5">🚶 A pé (Média: 5 km/h)</option>
        </select>
    </div>

    <button onclick="calcularTempo()">Calcular Tempo</button>

    <div id="resultado" class="result">
        <strong style="color: #1a73e8;">Resumo da Viagem:</strong>
        <p id="textoRota"></p>
        <p id="textoTempo" style="font-size: 18px; font-weight: bold; margin-top: 10px;"></p>
    </div>
</div>

<script>
function calcularTempo() {
    const origem = document.getElementById('origem').value || "Origem";
    const destino = document.getElementById('destino').value || "Destino";
    const distancia = parseFloat(document.getElementById('distancia').value);
    const velocidade = parseFloat(document.getElementById('transporte').value);

    if (isNaN(distancia) || distancia <= 0) {
        alert("Por favor, insira uma distância válida em quilômetros.");
        return;
    }

    // Cálculo do tempo em horas decimais
    let tempoTotalHoras = distancia / velocidade;

    // Adiciona uma margem de trânsito simulada (10% a mais) se for carro ou moto
    if (velocidade === 60 || velocidade === 70) {
        tempoTotalHoras *= 1.1; 
    }

    // Conversão para Horas e Minutos
    const horas = Math.floor(tempoTotalHoras);
    const minutos = Math.round((tempoTotalHoras - horas) * 60);

    // Formatação do texto de tempo
    let tempoFormatado = "";
    if (horas > 0) {
        tempoFormatado += `${horas} h `;
    }
    tempoFormatado += `${minutos} min`;

    // Exibir resultados na tela
    document.getElementById('textoRota').innerText = `De: ${origem} ➔ Para: ${destino} (${distancia} km)`;
    document.getElementById('textoTempo').innerText = `⏱️ Tempo estimado: ~ ${tempoFormatado}`;
    document.getElementById('resultado').style.display = 'block';
}
</script>

</body>
</html>
