<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Distância Offline - Cidades</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-white rounded-2xl shadow-xl p-6 sm:p-8">
        
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">🌍 Calculadora de Distância Offline</h1>
            <p class="text-gray-600 text-sm">Selecione uma cidade de origem e uma de destino na lista abaixo para calcular a distância em linha reta.</p>
        </div>

        <div class="space-y-6">
            
            <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                <label for="select-origem" class="block font-semibold text-gray-700 mb-2 text-sm uppercase tracking-wider">📍 Cidade de Origem</label>
                <select id="select-origem" class="w-full px-3 py-3 border border-gray-300 rounded-lg bg-white outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="" disabled selected>Selecione a origem...</option>
                </select>
            </div>

            <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                <label for="select-destino" class="block font-semibold text-gray-700 mb-2 text-sm uppercase tracking-wider">🏁 Cidade de Destino</label>
                <select id="select-destino" class="w-full px-3 py-3 border border-gray-300 rounded-lg bg-white outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="" disabled selected>Selecione o destino...</option>
                </select>
            </div>

            <button onclick="calcularDistanciaCidades()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-lg transition shadow-lg shadow-blue-500/20 cursor-pointer">
                Calcular Distância
            </button>
        </div>

        <div id="erro" class="mt-6 bg-red-50 border-l-4 border-red-500 p-4 rounded-r-lg hidden">
            <p class="text-red-700 font-medium text-sm" id="mensagem-erro">Selecione cidades válidas na lista.</p>
        </div>

        <div id="resultado" class="mt-6 bg-blue-50 rounded-xl p-6 border border-blue-100 text-center hidden">
            <span class="block text-sm text-blue-600 font-medium">Distância em linha reta</span>
            <span id="res-distancia" class="text-3xl font-extrabold text-blue-900 block mt-1"></span>
            <span class="block text-xs text-blue-500 mt-2">Cálculo baseado na curvatura da Terra (Fórmula de Haversine)</span>
        </div>

    </div>

    <script>
        // Banco de dados interno (adicione ou remova cidades e coordenadas aqui)
        const bancoDeCidades = [
            { nome: "São Paulo, Brasil", lat: -23.5505, lon: -46.6333 },
            { nome: "Rio de Janeiro, Brasil", lat: -22.9068, lon: -43.1729 },
            { nome: "Brasília, Brasil", lat: -15.7975, lon: -47.8919 },
            { nome: "Salvador, Brasil", lat: -12.9714, lon: -38.5014 },
            { nome: "Lisboa, Portugal", lat: 38.7223, lon: -9.1393 },
            { nome: "Porto, Portugal", lat: 41.1579, lon: -8.6291 },
            { nome: "Londres, Reino Unido", lat: 51.5074, lon: -0.1278 },
            { nome: "Paris, França", lat: 48.8566, lon: 2.3522 },
            { nome: "Madri, Espanha", lat: 40.4168, lon: -3.7038 },
            { nome: "Roma, Itália", lat: 41.9028, lon: 12.4964 },
            { nome: "Nova York, EUA", lat: 40.7128, lon: -74.0060 },
            { nome: "Tóquio, Japão", lat: 35.6762, lon: 139.6503 },
            { nome: "Buenos Aires, Argentina", lat: -34.6037, lon: -58.3816 },
            { nome: "Bogotá, Colômbia", lat: 4.7110, lon: -74.0721 },
            { nome: "Cidade do México, México", lat: 19.4326, lon: -99.1332 },
            { nome: "Luanda, Angola", lat: -8.8384, lon: 13.2344 },
            { nome: "Maputo, Moçambique", lat: -25.8839, lon: 32.5839 }
        ];

        // Preenche os seletores HTML ao carregar a página
        document.addEventListener("DOMContentLoaded", () => {
            const selectOrigem = document.getElementById('select-origem');
            const selectDestino = document.getElementById('select-destino');

            // Ordena as cidades alfabeticamente para facilitar a busca
            bancoDeCidades.sort((a, b) => a.nome.localeCompare(b.nome));

            bancoDeCidades.forEach((cidade, index) => {
                const option1 = document.createElement('option');
                option1.value = index;
                option1.text = cidade.nome;
                selectOrigem.appendChild(option1);

                const option2 = document.createElement('option');
                option2.value = index;
                option2.text = cidade.nome;
                selectDestino.appendChild(option2);
            });
        });

        // Fórmula matemática para calcular a distância esférica
        function calcularHaversine(lat1, lon1, lat2, lon2) {
            const R = 6371; // Raio médio da Terra em km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
                      
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function calcularDistanciaCidades() {
            const indiceOrigem = document.getElementById('select-origem').value;
            const indiceDestino = document.getElementById('select-destino').value;
            const erroDiv = document.getElementById('erro');
            const resultadoDiv = document.getElementById('resultado');

            if (indiceOrigem === "" || indiceDestino === "") {
                erroDiv.classList.remove('hidden');
                resultadoDiv.classList.add('hidden');
                return;
            }

            if (indiceOrigem === indiceDestino) {
                document.getElementById('mensagem-erro').innerText = "A origem e o destino não podem ser a mesma cidade.";
                erroDiv.classList.remove('hidden');
                resultadoDiv.classList.add('hidden');
                return;
            }

            erroDiv.classList.add('hidden');

            const cidade1 = bancoDeCidades[indiceOrigem];
            const cidade2 = bancoDeCidades[indiceDestino];

            // Executa o cálculo matemático local
            const distancia = calcularHaversine(cidade1.lat, cidade1.lon, cidade2.lat, cidade2.lon);

            // Exibe o resultado na tela
            document.getElementById('res-distancia').innerText = `${distancia.toFixed(2)} km`;
            resultadoDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
