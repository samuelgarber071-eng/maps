<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador de Rotas (Maps & Waze)</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #1a73e8;
            margin-top: 0;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccd0d5;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            transition: opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn-maps {
            background-color: #1a73e8;
        }
        .btn-waze {
            background-color: #33ccff;
            color: #222;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Abrir Rota em Tempo Real</h2>
    
    <div class="input-group">
        <label for="origem">Local de Partida (Deixe vazio para usar a sua localização atual):</label>
        <input type="text" id="origem" placeholder="Ex: Lisboa, Portugal">
    </div>

    <div class="input-group">
        <label for="destino">Local de Destino:</label>
        <input type="text" id="destino" placeholder="Ex: Porto, Portugal">
    </div>

    <button class="btn btn-maps" onclick="abrirMapa('google')">🗺️ Calcular no Google Maps</button>
    <button class="btn btn-waze" onclick="abrirMapa('waze')">🚙 Calcular no Waze</button>
</div>

<script>
function abrirMapa(plataforma) {
    const origem = encodeURIComponent(document.getElementById('origem').value.trim());
    const destino = encodeURIComponent(document.getElementById('destino').value.trim());

    if (!destino) {
        alert("Por favor, introduza pelo menos um local de destino.");
        return;
    }

    let url = "";

    if (plataforma === 'google') {
        // Se a origem estiver vazia, o Google Maps usa automaticamente a localização atual do GPS
        url = `https://www.google.com/maps/dir/?api=1&origin=${origem}&destination=${destino}&travelmode=driving`;
    } else if (plataforma === 'waze') {
        // O Waze assume sempre a localização atual como ponto de partida
        url = `https://waze.com/ul?q=${destino}&navigate=yes`;
    }

    // Abre a rota numa nova aba (ou diretamente na aplicação do telemóvel, se estiver a usar um)
    window.open(url, '_blank');
}
</script>

</body>
</html>
